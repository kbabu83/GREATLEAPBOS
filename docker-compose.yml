services:

  # ─── Laravel PHP-FPM ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: greatleap_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - greatleap
    depends_on:
      db:
        condition: service_healthy

  # ─── Nginx ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: greatleap_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - greatleap
    depends_on:
      - app

  # ─── MySQL ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: greatleap_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: greatleap_central
      MYSQL_USER: greatleap
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - greatleap

  # ─── Node / Vite (frontend build + HMR) ─────────────
  node:
    image: node:20-alpine
    container_name: greatleap_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - greatleap

networks:
  greatleap:
    driver: bridge

volumes:
  dbdata:
    driver: local
