# Nginx configuration for Great Leap App (multi-tenant)
# Place this at /etc/nginx/sites-available/greatleap and symlink to sites-enabled

server {
    listen 80;
    # Match central domain AND all subdomains
    server_name greatlap.local *.greatlap.local;

    root /var/www/great-leap-app01/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Handle all requests through Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Increase upload limit for tenant logos
    client_max_body_size 10M;
}
