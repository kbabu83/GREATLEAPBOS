/* ── CHART COMPONENTS (Chart.js canvas) ─────────────── */
function AreaLineChart({ data, labels, color = '#1A526D' }) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: color,
          backgroundColor: color + '20',
          borderWidth: 2.5,
          pointRadius: 3,
          pointBackgroundColor: color,
          fill: true,
          tension: 0.4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 11 } } },
          y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 11 } }, beginAtZero: true }
        }
      }
    });
    return () => chart.destroy();
  }, []);
  return <canvas ref={ref} />;
}

function DonutChart({ data, labels, colors }) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, usePointStyle: true, pointStyleWidth: 8 } } },
        cutout: '65%',
      }
    });
    return () => chart.destroy();
  }, []);
  return <canvas ref={ref} />;
}

function BarChartCanvas({ data, labels, colors }) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 6, borderSkipped: false }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
          y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 11 } }, beginAtZero: true }
        }
      }
    });
    return () => chart.destroy();
  }, []);
  return <canvas ref={ref} />;
}

        {/* Recent tenants */}
        <div className="lg:col-span-2 bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="px-6 py-4 border-b border-gray-100"><h3 className="text-base font-semibold text-gray-900">Recent Tenants</h3></div>
          <div className="p-6 space-y-3">
            {MOCK_TENANTS.slice(0,4).map(t=>(
              <div key={t.id} className="flex items-center gap-4 py-2 border-b border-gray-50 last:border-0">
                <div className="w-9 h-9 rounded-lg bg-[#E8F1F5] flex items-center justify-center flex-shrink-0">
                  <span className="text-[#1A526D] font-bold text-sm">{t.name.charAt(0)}</span>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium text-gray-900 truncate">{t.name}</p>
                  <p className="text-xs text-gray-400 truncate font-mono">{t.domain}</p>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  <PlanBadge plan={t.plan}/><StatusBadge status={t.status}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function TenantsPage() {
  const [search, setSearch] = useState('');
  const filtered = MOCK_TENANTS.filter(t => !search || t.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <div className="space-y-6 fade-in">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold text-gray-900">Tenants</h1><p className="text-sm text-gray-500 mt-1">Manage all organizations on the platform</p></div>

          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>New Tenant

      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">

            <svg className="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.5 4.5a7.5 7.5 0 0012.15 12.15z"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tenants..." className="w-full pl-9 pr-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#1A526D]/30 focus:border-[#1A526D]"/>
          </div>
          <select className="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#1A526D]/30 w-36 text-gray-600">
            <option>All statuses</option><option>Active</option><option>Trial</option><option>Inactive</option>
          </select>
          <select className="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#1A526D]/30 w-36 text-gray-600">
            <option>All plans</option><option>Free</option><option>Starter</option><option>Professional</option><option>Enterprise</option>
          </select>
        </div>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm text-left">
          <thead className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
            <tr>{['Organization','Domain','Plan','Status','Created','Actions'].map(h=><th key={h} className={`px-6 py-3 font-medium ${h==='Actions'?'text-right':''}`}>{h}</th>)}</tr>
          </thead>
          <tbody>
            {filtered.map(t=>(
              <tr key={t.id} className="border-t border-gray-100 hover:bg-gray-50 transition-colors">
                <td className="px-6 py-4">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-[#E8F1F5] flex items-center justify-center"><span className="text-[#1A526D] font-bold text-sm">{t.name.charAt(0)}</span></div>
                    <div><p className="font-medium text-gray-900">{t.name}</p><p className="text-xs text-gray-400">{t.email}</p></div>
                  </div>
                </td>
                <td className="px-6 py-4 font-mono text-xs text-gray-500">{t.domain}</td>
                <td className="px-6 py-4"><PlanBadge plan={t.plan}/></td>
                <td className="px-6 py-4"><StatusBadge status={t.status}/></td>
                <td className="px-6 py-4 text-gray-400 text-sm">{new Date(t.created_at).toLocaleDateString()}</td>
                <td className="px-6 py-4 text-right">
                  <div className="flex items-center justify-end gap-1">
                    <button className="p-1.5 rounded-lg text-gray-400 hover:text-[#1A526D] hover:bg-[#E8F1F5] transition-colors" title="Edit">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                    <button className="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="Delete">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>

                </td>
              </tr>

        </table>
        <div className="px-6 py-3 border-t border-gray-100 flex items-center justify-between">
          <p className="text-sm text-gray-500">Showing {filtered.length} of {MOCK_TENANTS.length} tenants</p>
          <div className="flex gap-1">
            <button className="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100">← Prev</button>
            <button className="px-3 py-1.5 text-sm rounded-lg bg-[#1A526D] text-white font-medium">1</button>
            <button className="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100">Next →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

    <div className="space-y-6 fade-in">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold text-gray-900">Users</h1><p className="text-sm text-gray-500 mt-1">Manage central platform users</p></div>
        <button className="inline-flex items-center gap-2 px-4 py-2 bg-[#1A526D] text-white text-sm font-semibold rounded-lg hover:bg-[#164761] transition-colors">
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>New User
        </button>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm text-left">
          <thead className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
            <tr>{['User','Role','Status','Last Login','Joined','Actions'].map(h=><th key={h} className={`px-6 py-3 font-medium ${h==='Actions'?'text-right':''}`}>{h}</th>)}</tr>

                    <div className="w-8 h-8 rounded-full bg-[#1A526D] flex items-center justify-center"><span className="text-white font-semibold text-sm">{u.name.charAt(0)}</span></div>
                    <div><p className="font-medium text-gray-900">{u.name}</p><p className="text-xs text-gray-400">{u.email}</p></div>
                  </div>
                </td>
                <td className="px-6 py-4"><RoleBadge role={u.role}/></td>
                <td className="px-6 py-4"><span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${u.is_active?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}`}>{u.is_active?'Active':'Inactive'}</span></td>
                <td className="px-6 py-4 text-gray-400 text-sm">{u.last_login_at?new Date(u.last_login_at).toLocaleDateString():'—'}</td>

                <td className="px-6 py-4 text-right">
                  <div className="flex items-center justify-end gap-1">
                    <button className="p-1.5 rounded-lg text-gray-400 hover:text-[#1A526D] hover:bg-[#E8F1F5] transition-colors"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
                    <button className="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>

}

/* ── APP SHELL ──────────────────────────────────────── */
function AppShell({ page, setPage, onLogout }) {
  const nav = [
    { id:'dashboard', label:'Dashboard', icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}><path strokeLinecap="round" strokeLinejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 13a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/></svg> },
    { id:'tenants',   label:'Tenants',   icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}><path strokeLinecap="round" strokeLinejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg> },
    { id:'users',     label:'Users',     icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg> },
  ];
  const titles = { dashboard:'Dashboard', tenants:'Tenants', users:'Users' };
  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      {/* Sidebar */}
      <aside className="w-64 flex-shrink-0 flex flex-col bg-gradient-to-b from-[#1A526D] to-[#123B52]">
        <div className="px-6 py-5 border-b border-white/10 flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-[#8CC63E] flex items-center justify-center flex-shrink-0">
            <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
          </div>
          <div><p className="text-white font-bold text-sm">Great Leap App</p><p className="text-white/50 text-xs">Admin Console</p></div>
        </div>
        <nav className="flex-1 px-3 py-4">
          <p className="px-4 text-xs font-semibold text-white/40 uppercase tracking-wider mb-2">Main</p>
          {nav.map(item=>(
            <div key={item.id} onClick={()=>setPage(item.id)} className={`sidebar-item mb-0.5 ${page===item.id?'active':'inactive'}`}>
              {item.icon}<span>{item.label}</span>
            </div>
          ))}
        </nav>
        <div className="border-t border-white/10 px-3 py-3">
          <div className="flex items-center gap-3 px-3 py-2 rounded-lg mb-1">
            <div className="w-8 h-8 rounded-full bg-[#8CC63E]/80 flex items-center justify-center flex-shrink-0">
              <span className="text-white text-xs font-semibold">S</span>
            </div>
            <div className="min-w-0"><p className="text-white text-xs font-medium truncate">Super Admin</p><p className="text-white/50 text-xs">admin@greatleap.app</p></div>
          </div>
          <div onClick={onLogout} className="sidebar-item inactive">
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            <span>Sign out</span>
          </div>
        </div>
      </aside>
      {/* Main */}
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
          <h2 className="text-lg font-semibold text-gray-900">{titles[page]}</h2>
          <div className="flex items-center gap-3">
            <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-[#E8F1F5] text-[#1A526D] text-xs font-medium">
              <span className="w-1.5 h-1.5 rounded-full bg-[#8CC63E]"></span>Admin Console
            </span>
            <div className="w-8 h-8 rounded-full bg-[#1A526D] flex items-center justify-center">
              <span className="text-white text-sm font-semibold">S</span>
            </div>
          </div>
        </header>
        <main className="flex-1 overflow-y-auto p-6">
          <div className="max-w-7xl mx-auto">
            {page==='dashboard' && <DashboardPage/>}
            {page==='tenants'   && <TenantsPage/>}
            {page==='users'     && <UsersPage/>}
          </div>
        </main>
      </div>
    </div>
  );
}

/* ── ROOT ───────────────────────────────────────────── */
function App() {
  const [view, setView]  = useState('login');
  const [page, setPage]  = useState('dashboard');
  if (view==='login')    return <LoginPage onLogin={()=>setView('app')} onRegister={()=>setView('register')}/>;
  if (view==='register') return <RegisterPage onBack={()=>setView('login')}/>;
  return <AppShell page={page} setPage={setPage} onLogout={()=>{ setView('login'); setPage('dashboard'); }}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
